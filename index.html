<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel = "icon" href = "icon.png" type = "image/x-icon">
    <title>study planner 📖</title>
</head>
<body>
        <div id = "header">
            <div id="header-content">
                <h1 id = "title">STUDY PLANNER!!</h1>
                <h3 id = "subtitle">PLAN IT!!PLANT IT!!</h3>
            </div>
            <img id="book-icon" src="book2.png" alt="Book icon">
        </div>

        <div id = "maincontainer">
        <div id = "left">
            <h1 style="color: palevioletred; size: 21px;"> MY SCHEDULE 📚</h1>
            <h3 style="color: palevioletred;">Consistent practice leads to better results!!</h3>

            <input color = "black" id = "task" type = "text" placeholder = "Enter your task">
            <br>
            <input id = "date" type = "date" placeholder = "Enter the date">
            <br>
            <button id = "addbtn">Add Task</button>
        </div>
        
        <div id = "right">
            <h1 style="color: palevioletred;">YOUR TASKS!!</h1>
            <button id = "clearbtn">Clear All</button>
            <ul  id = "tasklist"></ul>
            
        </div>
    
        </div>
        <script src = "script.js"></script>



</body>
</html>
